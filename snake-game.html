<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            text-align: center;
            color: white;
        }
        
        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        canvas {
            border: 2px solid #4CAF50;
            background-color: #111;
            display: block;
            margin: 0 auto 20px;
        }
        
        .score {
            font-size: 24px;
            margin-bottom: 15px;
            color: #FFD700;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .instructions {
            background-color: #333;
            padding: 15px;
            border-radius: 5px;
            max-width: 500px;
            margin: 20px auto;
            text-align: left;
        }
        
        .instructions h3 {
            color: #4CAF50;
            margin-top: 0;
        }
        
        .game-over {
            color: #ff4444;
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Game</h1>
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset Game</button>
        </div>
        
        <div id="gameOver" class="game-over" style="display: none;">Game Over!</div>
        
        <div class="instructions">
            <h3>How to Play:</h3>
            <p>• Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to control the snake</p>
            <p>• Eat the <span style="color: #FF4444;">red food</span> to grow and earn points</p>
            <p>• Avoid hitting the walls or yourself</p>
            <p>• Each food gives you <strong>10 points</strong></p>
            <p>• The game gets faster as your score increases!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [
            {x: 10, y: 10}
        ];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;
        let speed = 150; // Initial speed in ms
        
        // Initialize game
        function initGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            speed = 150;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            generateFood();
            draw();
        }
        
        // Generate random food position
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // Make sure food doesn't appear on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw snake
            ctx.fillStyle = '#4CAF50';
            for (let segment of snake) {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            }
            
            // Draw snake head (different color)
            ctx.fillStyle = '#2E7D32';
            const head = snake[0];
            ctx.fillRect(head.x * gridSize, head.y * gridSize, gridSize - 2, gridSize - 2);
            
            // Draw food
            ctx.fillStyle = '#FF4444';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            
            // Draw grid lines
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }
        
        // Move snake
        function moveSnake() {
            if (!gameRunning || gamePaused) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            // Add new head
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                
                // Increase speed every 50 points
                if (score % 50 === 0 && speed > 50) {
                    speed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameUpdate, speed);
                }
                
                generateFood();
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }
            
            draw();
        }
        
        // Main game update
        function gameUpdate() {
            moveSnake();
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameOverElement.style.display = 'block';
        }
        
        // Start game
        function startGame() {
            if (!gameRunning) {
                initGame();
                gameRunning = true;
                gamePaused = false;
                gameLoop = setInterval(gameUpdate, speed);
            }
        }
        
        // Pause/resume game
        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';
            
            if (gamePaused) {
                clearInterval(gameLoop);
            } else {
                gameLoop = setInterval(gameUpdate, speed);
            }
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;
            
            // Prevent snake from going backwards
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
            }
        });
        
        // Button event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resetBtn').addEventListener('click', () => {
            clearInterval(gameLoop);
            initGame();
            gameRunning = false;
            gamePaused = false;
            document.getElementById('pauseBtn').textContent = 'Pause';
        });
        
        // Initialize on load
        window.addEventListener('load', () => {
            initGame();
            draw();
        });
    </script>
</body>
</html>
